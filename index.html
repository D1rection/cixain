<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cicada's blog</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!--head-meta-->
    <script>(function(){var t=localStorage.getItem('cixain-theme');if(!localStorage.getItem('cixain-v2')){localStorage.setItem('cixain-v2','1');t=null}if(t!=='dark'&&t!=='light'){var h=new Date().getHours();t=h>=6&&h<18?'light':'dark'}document.documentElement.setAttribute('data-theme',t);var b=localStorage.getItem('cixain-bg'),x;if(b!==null)x=parseInt(b,10);else{var d=new Date();x=Math.floor((Date.now()-d.getTimezoneOffset()*6e4)/864e5)%3}document.documentElement.style.setProperty('--bg-image','url(https://cdn.jsdelivr.net/gh/D1rection/img@main/images/bg-'+x+'.png)')})()</script>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
